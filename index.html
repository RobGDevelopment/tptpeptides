<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDFIT | Research Peptides</title>
    
    <!-- Load React and ReactDOM via CDNJS (Local File Friendly) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Load Babel for JSX compilation in the browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Playfair Display', 'Georgia', 'serif'],
                    },
                    colors: {
                        medfit: {
                            dark: '#0a0a0c',
                            card: '#131316',
                            primary: '#ffffff',
                            accent: '#3b82f6'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        .dashboard-gradient {
            background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(147, 51, 234, 0.1), transparent 40%);
            background-color: #0a0a0c;
        }
        
        .glass-card {
            background: rgba(19, 19, 22, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const INVENTORY = [
            { id: '1', name: 'GHK-Cu', tag: '50mg', price: 49.00, inStock: true, desc: 'Known for its ability to stimulate collagen and elastin production. Excellent for tissue repair and anti-aging research.', purity: '>99.2%' },
            { id: '2', name: 'BPC-157', tag: '5mg', price: 49.00, inStock: true, desc: 'Body Protection Compound 157. Widely researched for its rapid healing properties in tendons, muscles, and the nervous system.', purity: '>99.5%' },
            { id: '3', name: 'CJC-1295 w/ DAC', tag: '2mg', price: 45.00, inStock: true, desc: 'Growth hormone releasing hormone (GHRH) analog. Formulated with Drug Affinity Complex to extend its half-life.', purity: '>99.1%' },
            { id: '4', name: 'Semaglutide', tag: '3mg', price: 110.00, inStock: true, desc: 'GLP-1 receptor agonist extensively studied for its effects on glycemic control and gastric emptying.', purity: '>99.8%' },
            { id: '5', name: 'Tirzepatide', tag: '10mg', price: 185.00, inStock: true, desc: 'Dual GIP and GLP-1 receptor agonist. Currently the subject of intense research for metabolic optimization.', purity: '>99.6%' },
            { id: '6', name: 'TB-500', tag: '5mg', price: 55.00, inStock: true, desc: 'Synthetic fraction of Thymosin Beta-4. Researched for its role in cellular repair and upregulation of actin.', purity: '>98.9%' },
            { id: '7', name: 'BPC-157 + TB-500 Blend', tag: '10mg/10mg', price: 179.00, inStock: true, desc: 'The ultimate research stack combining angiogenesis capabilities with cellular repair upregulation.', purity: '>99.4%' },
            { id: '8', name: 'MOTS-C', tag: '10mg', price: 65.00, inStock: true, desc: 'Mitochondrial-derived peptide known to target skeletal muscle and regulate metabolic homeostasis.', purity: '>99.0%' },
            { id: '9', name: 'Epithalon', tag: '10mg', price: 65.00, inStock: true, desc: 'Tetrapeptide studied for its potential to increase telomerase activity and regulate the pineal gland.', purity: '>99.3%' },
            { id: '10', name: 'NAD+', tag: '500mg', price: 85.00, inStock: true, desc: 'Crucial coenzyme found in all living cells, deeply involved in metabolic processes and cellular aging research.', purity: '>99.9%' }
        ];

        const Icons = {
            Cart: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            Menu: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            Heart: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Shield: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            Flask: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 2v7.31"/><path d="M14 9.3V1.99"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 1 1-4 0"/><path d="M5.52 16h12.96"/></svg>,
            Droplet: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>,
            Box: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
            Trophy: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>,
            ArrowRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        };

        const Navbar = ({ activeView, setActiveView, cartCount, setIsCartOpen }) => {
            const isDark = activeView !== 'shop';
            
            return (
                <nav className={`fixed top-0 w-full z-40 transition-colors duration-300 ${isDark ? 'bg-medfit-dark border-b border-white/5 text-white' : 'bg-white/90 backdrop-blur-md border-b border-gray-100 text-gray-900'}`}>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between h-16 items-center">
                            {/* Logo */}
                            <div className="flex-shrink-0 flex items-center cursor-pointer" onClick={() => setActiveView('shop')}>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="mr-2">
                                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                                </svg>
                                <span className="font-bold text-lg tracking-widest uppercase">MEDFIT</span>
                            </div>

                            {/* Center Nav */}
                            <div className="hidden md:flex space-x-8">
                                <button onClick={() => setActiveView('shop')} className={`text-sm font-medium ${activeView === 'shop' ? 'opacity-100' : 'opacity-60 hover:opacity-100'}`}>Shop</button>
                                <button onClick={() => setActiveView('dashboard')} className={`text-sm font-medium ${activeView === 'dashboard' ? 'opacity-100' : 'opacity-60 hover:opacity-100'}`}>Dashboard</button>
                                <button onClick={() => setActiveView('orders')} className={`text-sm font-medium ${activeView === 'orders' ? 'opacity-100' : 'opacity-60 hover:opacity-100'}`}>Orders</button>
                                <button onClick={() => setActiveView('rewards')} className={`text-sm font-medium ${activeView === 'rewards' ? 'opacity-100' : 'opacity-60 hover:opacity-100'}`}>Rewards</button>
                            </div>

                            {/* Actions */}
                            <div className="flex items-center space-x-5">
                                <button className="opacity-60 hover:opacity-100"><Icons.Search /></button>
                                <button onClick={() => setActiveView('dashboard')} className="opacity-60 hover:opacity-100"><Icons.User /></button>
                                <button onClick={() => setIsCartOpen(true)} className="opacity-60 hover:opacity-100 relative">
                                    <Icons.Cart />
                                    {cartCount > 0 && (
                                        <span className="absolute -top-1 -right-1 bg-medfit-accent text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">
                                            {cartCount}
                                        </span>
                                    )}
                                </button>
                            </div>
                        </div>
                    </div>
                </nav>
            );
        };

        const CartDrawer = ({ isOpen, setIsOpen, cart, setCart }) => {
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const freeShippingThreshold = 200;
            const progress = Math.min((total / freeShippingThreshold) * 100, 100);

            const updateQuantity = (id, change) => {
                setCart(cart.map(item => {
                    if (item.id === id) {
                        const newQ = item.quantity + change;
                        return newQ > 0 ? { ...item, quantity: newQ } : item;
                    }
                    return item;
                }).filter(item => item.quantity > 0));
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-50 flex justify-end">
                    {/* Backdrop */}
                    <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setIsOpen(false)}></div>
                    
                    {/* Drawer */}
                    <div className="relative w-full max-w-md bg-white h-full shadow-2xl flex flex-col animate-[slideIn_0.3s_ease-out]">
                        <div className="p-6 border-b border-gray-100 flex justify-between items-center">
                            <h2 className="text-xl font-bold font-serif">Your Cart</h2>
                            <button onClick={() => setIsOpen(false)} className="text-gray-400 hover:text-black">
                                <Icons.X />
                            </button>
                        </div>

                        {/* Free Shipping Bar */}
                        <div className="bg-gray-50 p-4 border-b border-gray-100">
                            {progress < 100 ? (
                                <p className="text-sm font-medium text-gray-700 mb-2">
                                    Add <span className="font-bold text-medfit-accent">${(freeShippingThreshold - total).toFixed(2)}</span> more for Free Express Shipping
                                </p>
                            ) : (
                                <p className="text-sm font-bold text-green-600 mb-2 flex items-center">
                                    <Icons.Check /> <span className="ml-1">You've unlocked Free Express Shipping!</span>
                                </p>
                            )}
                            <div className="w-full bg-gray-200 rounded-full h-1.5">
                                <div className="bg-medfit-accent h-1.5 rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
                            </div>
                        </div>

                        {/* Cart Items */}
                        <div className="flex-1 overflow-y-auto p-6 space-y-6">
                            {cart.length === 0 ? (
                                <div className="text-center text-gray-500 mt-10">
                                    <Icons.Cart />
                                    <p className="mt-4">Your research cart is empty.</p>
                                    <button onClick={() => setIsOpen(false)} className="mt-4 text-medfit-accent font-medium">Continue Shopping</button>
                                </div>
                            ) : (
                                cart.map(item => (
                                    <div key={item.id} className="flex items-center gap-4">
                                        <div className="w-16 h-16 bg-gray-50 rounded-lg border border-gray-100 flex items-center justify-center flex-shrink-0">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                                        </div>
                                        <div className="flex-1">
                                            <h4 className="text-sm font-bold">{item.name}</h4>
                                            <p className="text-xs text-gray-500">{item.tag}</p>
                                            <div className="flex items-center mt-2 border border-gray-200 rounded-md w-24">
                                                <button onClick={() => updateQuantity(item.id, -1)} className="px-2 py-1 text-gray-500 hover:text-black">-</button>
                                                <span className="flex-1 text-center text-sm">{item.quantity}</span>
                                                <button onClick={() => updateQuantity(item.id, 1)} className="px-2 py-1 text-gray-500 hover:text-black">+</button>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <p className="font-semibold">${(item.price * item.quantity).toFixed(2)}</p>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>

                        {/* Footer */}
                        {cart.length > 0 && (
                            <div className="p-6 border-t border-gray-100 bg-gray-50">
                                <div className="flex justify-between mb-4 text-lg font-bold">
                                    <span>Subtotal</span>
                                    <span>${total.toFixed(2)}</span>
                                </div>
                                <p className="text-xs text-gray-500 mb-4 text-center">
                                    By proceeding, you agree these products are for Research Use Only.
                                </p>
                                <button className="w-full bg-black text-white py-4 rounded-xl font-bold hover:bg-gray-800 transition">
                                    Secure Checkout
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const ProductModal = ({ product, onClose, addToCart }) => {
            if (!product) return null;

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6">
                    <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="relative w-full max-w-4xl bg-white rounded-2xl shadow-2xl flex flex-col md:flex-row overflow-hidden max-h-[90vh]">
                        
                        <button onClick={onClose} className="absolute top-4 right-4 z-10 p-2 bg-white/80 rounded-full hover:bg-gray-100">
                            <Icons.X />
                        </button>

                        {/* Image Side */}
                        <div className="w-full md:w-1/2 bg-gray-50 p-12 flex flex-col items-center justify-center relative border-r border-gray-100">
                            <div className="w-32 h-48 relative mb-8">
                                <div className="absolute top-0 w-full h-6 bg-gray-300 rounded-t-sm shadow-inner"></div>
                                <div className="absolute top-6 w-full h-40 bg-white border-2 border-gray-200 rounded-b-xl shadow-lg flex items-center justify-center flex-col relative overflow-hidden">
                                    <div className="absolute top-0 w-full h-2 bg-red-500"></div>
                                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                                    <span className="text-[10px] font-bold mt-2 text-gray-800 tracking-widest">MEDFIT</span>
                                    <span className="text-[8px] text-gray-400 mt-1">{product.tag}</span>
                                </div>
                            </div>
                            <div className="flex gap-4">
                                <span className="inline-flex items-center text-xs font-bold text-green-700 bg-green-100 px-3 py-1 rounded-full">
                                    <Icons.Check /> <span className="ml-1">In Stock</span>
                                </span>
                            </div>
                        </div>

                        {/* Content Side */}
                        <div className="w-full md:w-1/2 p-8 md:p-12 overflow-y-auto">
                            <div className="mb-2">
                                <span className="text-xs font-bold tracking-widest text-medfit-accent uppercase">Research Peptide</span>
                            </div>
                            <h2 className="text-4xl font-bold font-serif mb-2">{product.name}</h2>
                            <p className="text-2xl font-light text-gray-600 mb-6">${product.price.toFixed(2)} <span className="text-sm text-gray-400">/ vial</span></p>
                            
                            <p className="text-gray-600 leading-relaxed mb-8">{product.desc}</p>

                            {/* Trust Badges */}
                            <div className="grid grid-cols-2 gap-4 mb-8">
                                <div className="p-4 bg-gray-50 rounded-xl border border-gray-100">
                                    <Icons.Shield />
                                    <h4 className="font-bold text-sm mt-2">Verified Purity</h4>
                                    <p className="text-xs text-gray-500 mt-1">{product.purity} via HPLC</p>
                                </div>
                                <div className="p-4 bg-gray-50 rounded-xl border border-gray-100">
                                    <Icons.Flask />
                                    <h4 className="font-bold text-sm mt-2">USA Synthesized</h4>
                                    <p className="text-xs text-gray-500 mt-1">ISO 9001 Facility</p>
                                </div>
                            </div>

                            <button 
                                onClick={() => addToCart(product)}
                                className="w-full bg-black text-white py-4 rounded-xl font-bold text-lg hover:bg-gray-800 transition shadow-xl mb-4"
                            >
                                Add to Research Cart
                            </button>
                            <p className="text-[10px] text-gray-400 text-center uppercase tracking-wider">
                                Strict Policy: Not for human consumption. Research use only.
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const ShopView = ({ addToCart }) => {
            const [selectedProduct, setSelectedProduct] = useState(null);

            return (
                <div className="min-h-screen bg-white pt-16">
                    {/* Hero Section */}
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-20 pb-12 text-center">
                        <p className="text-sm tracking-widest text-gray-500 uppercase mb-4">Healing Peptides</p>
                        <h1 className="text-7xl font-bold tracking-tight text-gray-900 mb-6 font-serif">GHK-Cu</h1>
                        <p className="text-xl text-gray-600 max-w-2xl mx-auto mb-10 font-light">
                            Your skin has never looked better. Bring your youth right back to the surface.
                        </p>
                        
                        <div className="flex justify-center gap-16 mb-16">
                            <div className="text-center">
                                <div className="mx-auto w-12 h-12 flex items-center justify-center border border-gray-200 rounded-full mb-3 text-medfit-accent">
                                    <Icons.Droplet />
                                </div>
                                <h3 className="font-serif text-xl">70% More Collagen</h3>
                                <p className="text-xs text-gray-500 mt-1">Stimulates production</p>
                            </div>
                            <div className="text-center">
                                <div className="mx-auto w-12 h-12 flex items-center justify-center border border-gray-200 rounded-full mb-3 text-medfit-accent">
                                    <Icons.Flask />
                                </div>
                                <h3 className="font-serif text-xl">Proven Anti-Aging</h3>
                                <p className="text-xs text-gray-500 mt-1">Cellular regeneration</p>
                            </div>
                        </div>
                    </div>

                    {/* Trust Bar (New Addition) */}
                    <div className="border-y border-gray-100 bg-gray-50 py-6 mb-16">
                        <div className="max-w-7xl mx-auto px-4 flex flex-wrap justify-center gap-8 md:gap-24 text-sm font-medium text-gray-600">
                            <span className="flex items-center"><Icons.Check /><span className="ml-2">3rd Party HPLC Tested</span></span>
                            <span className="flex items-center"><Icons.Shield /><span className="ml-2">Guaranteed &gt;99% Purity</span></span>
                            <span className="flex items-center"><Icons.Box /><span className="ml-2">Discreet Shipping</span></span>
                        </div>
                    </div>

                    {/* Product Grid */}
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-24">
                        <div className="flex justify-between items-end mb-8">
                            <h2 className="text-3xl font-serif font-bold">Research Inventory</h2>
                        </div>
                        
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-x-6 gap-y-12">
                            {INVENTORY.map(product => (
                                <div key={product.id} className="group cursor-pointer" onClick={() => setSelectedProduct(product)}>
                                    <div className="aspect-[4/5] bg-gray-50 rounded-2xl p-6 flex flex-col items-center justify-center relative transition-all duration-300 group-hover:-translate-y-2 group-hover:shadow-xl border border-gray-100 group-hover:border-gray-200">
                                        
                                        <button className="absolute top-4 right-4 text-gray-300 hover:text-red-500 transition z-10" onClick={(e) => { e.stopPropagation(); }}>
                                            <Icons.Heart />
                                        </button>
                                        
                                        <div className="flex items-center text-[10px] font-bold text-gray-400 absolute top-4 left-4 uppercase tracking-wider">
                                            {product.inStock ? 'In Stock' : 'Out'}
                                        </div>

                                        {/* Minimalist Vial Graphic */}
                                        <div className="w-20 h-28 relative mt-4">
                                            <div className="absolute top-0 w-full h-4 bg-gray-300 rounded-t-sm"></div>
                                            <div className="absolute top-4 w-full h-24 bg-white border-2 border-gray-100 rounded-b-lg shadow-sm flex items-center justify-center flex-col">
                                                 <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                                                 <span className="text-[8px] font-bold mt-1 text-gray-400">MEDFIT</span>
                                            </div>
                                        </div>

                                        {/* Quick Add Overlay */}
                                        <div className="absolute inset-x-0 bottom-4 px-4 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                            <button 
                                                className="w-full bg-black text-white text-xs font-bold py-2.5 rounded-full shadow-lg hover:bg-gray-800"
                                                onClick={(e) => { 
                                                    e.stopPropagation(); 
                                                    addToCart(product); 
                                                }}
                                            >
                                                + Quick Add
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <div className="mt-4 text-center">
                                        <span className="inline-block bg-blue-50 text-blue-600 text-[10px] font-bold px-2 py-0.5 rounded-full mb-2 border border-blue-100">
                                            {product.tag}
                                        </span>
                                        <h3 className="text-sm font-bold text-gray-900">{product.name}</h3>
                                        <div className="mt-1 flex items-center justify-center">
                                            <p className="text-sm text-gray-600">${product.price.toFixed(2)}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <ProductModal 
                        product={selectedProduct} 
                        onClose={() => setSelectedProduct(null)} 
                        addToCart={(p) => { addToCart(p); setSelectedProduct(null); }}
                    />
                </div>
            );
        };

        const DashboardView = ({ setActiveView }) => (
            <div className="min-h-screen dashboard-gradient text-white pt-24 pb-12">
                <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
                    <h1 className="text-5xl font-bold tracking-tight mb-2">Dashboard</h1>
                    <p className="text-gray-400 text-lg mb-10">Manage your account and orders.</p>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="glass-card rounded-2xl p-6 hover:bg-white/5 transition cursor-pointer" onClick={() => setActiveView('orders')}>
                            <div className="flex justify-between items-start mb-6">
                                <div className="flex items-center text-sm font-medium text-gray-300">
                                    <Icons.Box /> <span className="ml-2">Orders</span>
                                </div>
                                <Icons.ArrowRight />
                            </div>
                            <h3 className="text-lg font-medium mb-1">View your order history</h3>
                            <p className="text-sm text-gray-500">Track shipments and status</p>
                        </div>
                        <div className="glass-card rounded-2xl p-6 hover:bg-white/5 transition cursor-pointer" onClick={() => setActiveView('rewards')}>
                            <div className="flex justify-between items-start mb-6">
                                <div className="flex items-center text-sm font-medium text-gray-300">
                                    <Icons.Trophy /> <span className="ml-2">Rewards</span>
                                </div>
                                <Icons.ArrowRight />
                            </div>
                            <h3 className="text-lg font-medium mb-1">Earn points with every purchase</h3>
                            <p className="text-sm text-gray-500">Learn more about tiers</p>
                        </div>
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [activeView, setActiveView] = useState('shop'); 
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);

            useEffect(() => {
                window.scrollTo(0, 0);
            }, [activeView]);

            const addToCart = (product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) {
                        return prev.map(item => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
                    }
                    return [...prev, { ...product, quantity: 1 }];
                });
                setIsCartOpen(true);
            };

            const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);

            const renderView = () => {
                switch(activeView) {
                    case 'shop': return <ShopView addToCart={addToCart} />;
                    case 'dashboard': return <DashboardView setActiveView={setActiveView} />;
                    case 'orders': return <DashboardView setActiveView={setActiveView} />; // Fallback for prototype
                    case 'rewards': return <DashboardView setActiveView={setActiveView} />; // Fallback for prototype
                    default: return <ShopView addToCart={addToCart} />;
                }
            };

            return (
                <div className={`min-h-screen ${activeView === 'shop' ? 'bg-white' : 'bg-medfit-dark'}`}>
                    <Navbar activeView={activeView} setActiveView={setActiveView} cartCount={cartCount} setIsCartOpen={setIsCartOpen} />
                    {renderView()}
                    <CartDrawer isOpen={isCartOpen} setIsOpen={setIsCartOpen} cart={cart} setCart={setCart} />
                    
                    {activeView === 'shop' && (
                        <footer className="bg-white border-t border-gray-100 py-12 mt-12">
                            <div className="max-w-7xl mx-auto px-4 text-center">
                                <h2 className="font-bold tracking-widest uppercase mb-4 text-gray-900">MEDFIT</h2>
                                <p className="text-sm text-gray-500 mb-8 max-w-md mx-auto leading-relaxed">
                                    All products are strictly for research purposes only. Not for human consumption or therapeutic use. Handle in accordance with proper laboratory protocols.
                                </p>
                                <div className="text-xs text-gray-400 font-medium">
                                    © 2026 MedFit Research. All rights reserved.
                                </div>
                            </div>
                        </footer>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
